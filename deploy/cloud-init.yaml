#cloud-config
# cloud-init za svež Ubuntu 24.04 Hetzner server (jn-watchdog).
# Uporaba: prilepi v Hetzner Cloud Console -> Create Server -> Cloud config,
# ali prek hcloud CLI: --user-data-from-file deploy/cloud-init.yaml
#
# PRED UPORABO: zamenjaj <TVOJ_SSH_JAVNI_KLJUC> s svojim javnim ključem
# (vsebina datoteke ~/.ssh/id_ed25519.pub).

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - unattended-upgrades
  - ca-certificates
  - curl
  - git

users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - <TVOJ_SSH_JAVNI_KLJUC>

# SSH: samo ključi, brez root prijave
ssh_pwauth: false
disable_root: true

write_files:
  # fail2ban: zaščita SSH
  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      maxretry = 5
      bantime = 1h
      findtime = 10m

  # unattended-upgrades: samodejne varnostne posodobitve
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

runcmd:
  # Docker iz uradnega repozitorija
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  # deploy uporabnik v docker skupino (skupina obstaja šele po instalaciji dockerja)
  - usermod -aG docker deploy
  # ufw: privzeto vse zapri, odpri 22/80/443
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  # fail2ban
  - systemctl enable --now fail2ban
  # Mapa za aplikacijo
  - mkdir -p /opt/jn-watchdog
  - chown deploy:deploy /opt/jn-watchdog

final_message: "jn-watchdog server pripravljen. Prijava: ssh deploy@<IP>"
