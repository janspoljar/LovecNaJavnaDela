# CI/CD: push na main -> testi -> SSH deploy na Hetzner server.
# Potrebni GitHub secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST        - IP serverja
#   SSH_USER        - deploy
#   SSH_PRIVATE_KEY - zasebni SSH ključ za deploy uporabnika

name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Namesti odvisnosti
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Poženi teste
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /opt/jn-watchdog
            git pull origin main
            docker compose up -d --build
            docker image prune -f
